# The version property is now optional in modern Docker Compose
# version: '3.8'

name: wwebjs-api

services:
  api:
    build: 
      context: .
      dockerfile: ./Dockerfile
    container_name: wwebjs-api
    restart: always
    ports:
      - "8000:80"
    networks:
      - my-network
    environment:
      # Core Configuration
      - PORT=80
      - BASE_WEBHOOK_URL=https://whatsbot.com.kg/api/whatsapp/webhook
      - MAX_ATTACHMENT_SIZE=5000000 # In bytes (5MB)
      - SET_MESSAGES_AS_SEEN=TRUE
      - ENABLE_LOCAL_CALLBACK_EXAMPLE=FALSE
      - ENABLE_SWAGGER_ENDPOINT=TRUE
      - RECOVER_SESSIONS=TRUE
      
      # Security Settings
      - API_KEY=XOFto1idyDEwf5AV # Uncomment and set for production
      
      # Rate Limiting Configuration
      # - RATE_LIMIT_MAX=1000 # Maximum connections per time window
      # - RATE_LIMIT_WINDOW_MS=1000 # Time window in milliseconds
      
      # WhatsApp Web Configuration
      - WEB_VERSION='2.3000.1031490220-alpha' # Specific WhatsApp Web version
      - WEB_VERSION_CACHE_TYPE=remote # Options: local, remote, none
      
      # Callback Configuration
      - DISABLED_CALLBACKS=message_ack|message_reaction|change_state|unread_count|message_edit|message_ciphertext|group_join|group_leave|group_update|message|ready|contact_changed|message_revoke_everyone|loading_screen
    volumes:
      - ./sessions:/usr/src/app/sessions
    # Optional healthcheck
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
networks:
  my-network:
    external: true